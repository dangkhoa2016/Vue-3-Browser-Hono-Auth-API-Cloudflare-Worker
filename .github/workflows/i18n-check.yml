name: i18n-check

on:
  pull_request:
    paths:
      - 'assets/js/locales/**'
      - 'vue/**'
      - 'tools/i18n.js'
      - 'tools/i18n-audit.js'
      - 'tools/i18n-usage-check.js'
      - '.github/workflows/i18n-check.yml'
  push:
    branches: [ main, master ]
    paths:
      - 'assets/js/locales/**'
      - 'vue/**'
      - 'tools/i18n.js'
      - 'tools/i18n-audit.js'
      - 'tools/i18n-usage-check.js'
      - '.github/workflows/i18n-check.yml'

jobs:
  i18n-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run i18n check (audit + usage)
        run: node tools/i18n.js check
